<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Calculadora Laboratorial</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; }
        .tab-button { padding: 10px; cursor: pointer; border: 1px solid #ccc; }
        .tab-content { display: none; padding: 20px; border: 1px solid #ccc; }
        .active { display: block; }
    </style>
    <link rel="manifest" href="manifest.json">
</head>
<body>
  <img src="https://i.postimg.cc/BvSSwgKV/SFLOGO.jpg" alt="Logo do App" style="width: 100%; max-width: 500px; display: block; margin: 0 auto;">
    
    <h2>Calculadora de Exames</h2>

    <div>
        <button class="tab-button" onclick="mudarAba(event, 'clearance')">Clearance</button>
        <button class="tab-button" onclick="mudarAba(event, 'ureia')">Ureia</button>
        <button class="tab-button" onclick="mudarAba(event, 'acidoUrico')">Ácido Úrico</button>
    </div>

    <div id="clearance" class="tab-content active">
        <h3>Clearance de Creatinina</h3>
        Urina (mg/dL): <input type="number" id="uCreat"><br>
        Soro (mg/dL): <input type="number" id="sCreat"><br>
        Volume (mL): <input type="number" id="volClearance"><br>
        <button onclick="calcClearance()">Calcular</button>
        <p id="resClearance"></p>
    </div>

    <div id="ureia" class="tab-content">
        <h3>Ureia 24h</h3>
        Concentração (mg/dL): <input type="number" id="concUreia"><br>
        Volume (mL): <input type="number" id="volUreia"><br>
        <button onclick="calcUreia()">Calcular</button>
        <p id="resUreia"></p>
    </div>

    <div id="acidoUrico" class="tab-content">
        <h3>Ácido Úrico 24h</h3>
        Concentração (mg/dL): <input type="number" id="concAU"><br>
        Volume (mL): <input type="number" id="volAU"><br>
        <button onclick="calcAU()">Calcular</button>
        <p id="resAU"></p>
    </div>

    <script>
        function mudarAba(evt, nomeAba) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(nomeAba).classList.add('active');
        }

        function calcClearance() {
            let u = document.getElementById('uCreat').value;
            let s = document.getElementById('sCreat').value;
            let v = document.getElementById('volClearance').value;
            let res = (u * v) / (s * 1440);
            document.getElementById('resClearance').innerText = "Resultado: " + res.toFixed(2) + " mL/min";
        }

        function calcUreia() {
            let c = document.getElementById('concUreia').value;
            let v = document.getElementById('volUreia').value;
            let res = (c * v) / 100;
            document.getElementById('resUreia').innerText = "Resultado: " + res.toFixed(2) + " mg/24h";
        }

        function calcAU() {
            let c = document.getElementById('concAU').value;
            let v = document.getElementById('volAU').value;
            let res = (c * v) / 100;
            document.getElementById('resAU').innerText = "Resultado: " + res.toFixed(2) + " mg/24h";
        }
    </script>
</body>
</html>

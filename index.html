<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Laboratorial</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 15px; max-width: 600px; margin: auto; background-color: #f4f7f6; }
        img { width: 100%; border-radius: 8px; margin-bottom: 20px; }
        .tab-button { padding: 12px 20px; cursor: pointer; border: none; background: #e0e0e0; font-weight: bold; border-radius: 5px 5px 0 0; }
        .tab-button.active { background: #2e7d32; color: white; }
        .tab-content { display: none; padding: 25px; border-radius: 0 0 8px 8px; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .active { display: block; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        button.calc-btn { width: 100%; padding: 15px; background: #2e7d32; color: white; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <img src="https://i.postimg.cc/BvSSwgKV/SFLOGO.jpg" alt="Logo">
    
    <div style="display: flex;">
        <button class="tab-button active" onclick="mudarAba(event, 'clearance')">Clearance</button>
        <button class="tab-button" onclick="mudarAba(event, 'ureia')">Ureia</button>
        <button class="tab-button" onclick="mudarAba(event, 'acidoUrico')">Á. Úrico</button>
    </div>

    <div id="clearance" class="tab-content active">
        <h3>Clearance de Creatinina</h3>
        <input type="number" id="uCreat" placeholder="Creatinina Urinária (mg/dL)">
        <input type="number" id="sCreat" placeholder="Creatinina Sérica (mg/dL)">
        <input type="number" id="volClearance" placeholder="Volume 24h (mL)">
        <input type="number" id="peso" placeholder="Peso (kg) - Para correção">
        <button class="calc-btn" onclick="calcClearance()">Calcular</button>
        <p id="resClearance"></p>
    </div>

    <div id="ureia" class="tab-content">
        <h3>Ureia 24h</h3>
        <input type="number" id="concUreia" placeholder="Concentração (mg/dL)">
        <input type="number" id="volUreia" placeholder="Volume 24h (mL)">
        <button class="calc-btn" onclick="calcUreia()">Calcular</button>
        <p id="resUreia"></p>
    </div>

    <script>
        function mudarAba(evt, nomeAba) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
            document.getElementById(nomeAba).classList.add('active');
            evt.currentTarget.classList.add('active');
        }

        function calcClearance() {
            let u = document.getElementById('uCreat').value;
            let s = document.getElementById('sCreat').value;
            let v = document.getElementById('volClearance').value;
            let p = document.getElementById('peso').value;
            let res = (u * v) / (s * 1440);
            // Simulação de correção simples (ex: normalização pela superfície corporal)
            let resCorrigido = p > 0 ? (res * (1.73 / (p * 0.01))) : res; 
            document.getElementById('resClearance').innerHTML = 
                "Resultado: <b>" + res.toFixed(2) + " mL/min</b><br>" + 
                (p > 0 ? "Corrigido: " + resCorrigido.toFixed(2) + " mL/min/1.73m²" : "");
        }
        // Funções de Ureia/Ác. Úrico omitidas para brevidade, mantenha as anteriores
    </script>
</body>
</html>
